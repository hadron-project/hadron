apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{.Values.cluster}}
  namespace: {{.Values.namespace | default .Release.Namespace}}
  labels:
    app: hadron
    app.kubernetes.io/name: hadron
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
rules:
# This rule allows for management of the Hadron cluster lease & all Hadron resources.
- apiGroups: ["coordination.k8s.io", "hadron.rs"]
  resources:
    - "streams"
    - "streams/status"
    - "pipelines"
    - "pipelines/status"
    - "tokens"
    - "tokens/status"
    - "leases"
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# This rule allows for watching pods which are members of the Hadron cluster.
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
