## The name of the Hadron cluster to create.
cluster: hadron
## The availability zone which the Hadron cluster is being created in.
zone: az0

## The service which will be used by clients for communicating with the Hadron cluster.
service:
  annotations: {}
  labels: {}
  port: 7000

statefulSet:
  replicas: 3

  annotations: {}
  labels: {}

  image:
    fullName: docker.io/hadron-project/hadron:latest
    pullPolicy: IfNotPresent

  pod:
    annotations: {}
    labels: {}

  ## Server Config
  server:
    ## Logging configuration.
    logging: "error,hadrond=trace"
    ## The port which client network traffic is to use.
    clientPort: 7000
    ## The port which cluster internal network traffic is to use.
    serverPort: 7001

  ## K8s Leadership Config
  lease:
    ## The duration in seconds for which a lease is considered held.
    durationSeconds: 60
    ## The duration that a lease holder will retry refreshing lease.
    renewSeconds: 10

  ## Storage Config
  storage:
    ## The path where the persistent volume for data storage will be mounted.
    dbPath: /usr/local/hadron/data

  ## JWT Config
  jwt:
    ## The value to use for referencing the JWT encoding key. Will be inlined as YAML.
    encodingKey: {}
    ## The value to use for referencing the JWT decoding key. Will be inlined as YAML.
    decodingKey: {}

  ## Volume Config
  volume:
    ## The size of the persistent volume to provision for data storage.
    volumeSize: 5Gi
    ## The name of the storage class to use.
    ##
    ## NOTE: create your own storage class using your K8s storage provisioner,
    ## and overwrite this value.
    storageClassName: "standard"
    ## The access modes for the persistent volume for data storage.
    accessModes: [ "ReadWriteOnce" ]
